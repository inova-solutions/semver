name: ci
on:
  push:
    branches: ['main', 'releases/**']

permissions:
  id-token: write  # Required for OIDC to publish on npm registry
  contents: write  # Required for chore commit on package.json

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node-version }}

      - name: Set base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@v3
      - run: |
          echo "BASE: ${{ env.NX_BASE }}"
          echo "HEAD: ${{ env.NX_HEAD }}"

        # install dependencies for root and all sub packages
      - name: install dependencies main
        run: npm ci
      - name: install dependencies semver
        working-directory: packages/semver
        run: npm ci

      - name: test affected
        run: npx nx affected:test
      - name: lint affected
        run: npx nx affected:lint
      - name: build affected
        run: npx nx affected:build

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v2
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      # install dependencies for root and all sub packages
      - name: install dependencies main
        run: npm ci
      - name: install dependencies semver
        working-directory: packages/semver
        run: npm ci

      - name: build affected
        run: npx nx affected:build --base=origin/main~1 --head=HEAD

      - name: bump version
        run: npm run bump

      - name: check semver dist exists
        id: check_semver_dist
        uses: andstor/file-existence-action@v1
        with:
          files: 'dist/packages/semver/package.json'

      - name: publish semver
        if: steps.check_semver_dist.outputs.files_exists == 'true'
        working-directory: dist/packages/semver
        run: |
          set -euo pipefail

          echo "Registry: $(npm config get registry)"
          echo "Package name: $(npm pkg get name)"
          echo "Package version: $(npm pkg get version)"

          echo "== npm whoami =="
          npm whoami

          echo "== npm ping =="
          npm ping

          echo "== package lookup =="
          npm view @inova/semver version || echo "@inova/semver not found yet"

          echo "== publish =="
          npm publish --ignore-scripts --access public
